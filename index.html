<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor LSE</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #ffffff;
            font-family: 'DM Serif Display', serif; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(162,217,255,0.4), transparent 45%),
                        radial-gradient(circle at 90% 90%, rgba(255,194,224,0.4), transparent 45%);
            z-index: -1;
        }
        h1 { color: #1a252f; font-size: 3rem; margin: 10px 0; font-weight: bold; }
        .subtitle { color: #444; font-size: 1.1rem; margin-bottom: 25px; font-style: italic; font-family: sans-serif; }

        /* CONTENEDOR RÍGIDO */
        #video-viewport { 
            width: 320px; height: 320px; background: #fff; border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; 
            margin-bottom: 20px; border: 5px solid #fff; position: relative;
        }
        
        /* AJUSTE DE VIDEO UNIFORME */
        video { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            /* El secreto: 'cover' recorta y ajusta para que siempre se vea igual */
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 0.15s; 
            background: #fff;
        }
        video.active { opacity: 1; z-index: 10; }

        #transcript-area { 
            color: #1a252f; font-size: 1.4rem; font-weight: bold; font-family: sans-serif;
            margin-bottom: 30px; text-align: center; min-height: 1.5em; width: 85%;
        }
        
        #main-btn {
            background: #2c3e50; color: white; border: none; padding: 20px 55px;
            border-radius: 50px; cursor: pointer; font-size: 1.2rem; font-weight: bold;
            letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
            font-family: sans-serif; z-index: 20;
        }
        #main-btn.recording { background: #e74c3c; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>De Voz a Signos</h1>
    <div class="subtitle">Traductor LSE Personalizado</div>
    
    <div id="video-viewport">
        <video id="v1" class="active" playsinline muted></video>
        <video id="v2" playsinline muted></video>
    </div>

    <div id="transcript-area">Presiona abajo para traducir</div>

    <button id="main-btn" onclick="toggleRecognition()">HABLAR AHORA</button>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const transcriptArea = document.getElementById('transcript-area');
        const mainBtn = document.getElementById('main-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        let currentPlayer = v1;
        let nextPlayer = v2;
        let recognition;
        let isRecording = false;

        function limpiarTexto(texto) {
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.onstart = () => {
                isRecording = true;
                mainBtn.innerText = "DETENER";
                mainBtn.classList.add('recording');
            };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase().trim();
                transcriptArea.innerText = '"' + text + '"';
                processText(limpiarTexto(text));
            };
            recognition.onend = () => {
                isRecording = false;
                mainBtn.innerText = "HABLAR AHORA";
                mainBtn.classList.remove('recording');
            };
        }

        function toggleRecognition() {
            if (!recognition) return alert("Usa Chrome");
            isRecording ? recognition.stop() : recognition.start();
        }

        async function processText(text) {
            const palabrasGrabadas = ["hola", "adios", "gracias"];
            const listaPalabras = text.split(/\s+/);
            let cola = [];

            for (let p of listaPalabras) {
                if (palabrasGrabadas.includes(p)) {
                    cola.push(`LSE/videos/${p}.mp4`);
                } else {
                    p.split("").forEach(l => {
                        if(l.match(/[a-z]/i)) cola.push(`LSE/videos/${l}.mp4`);
                    });
                }
            }

            for (let i = 0; i < cola.length; i++) {
                // Precargamos el siguiente video mientras suena el actual
                if (i + 1 < cola.length) {
                    nextPlayer.src = cola[i + 1];
                    nextPlayer.load();
                }
                await playCurrent(cola[i]);
            }
        }

        function playCurrent(src) {
            return new Promise((resolve) => {
                if (currentPlayer.src.indexOf(src) === -1) {
                    currentPlayer.src = src;
                    currentPlayer.load();
                }

                currentPlayer.onended = () => {
                    // Cambio rápido de jugador
                    currentPlayer.classList.remove('active');
                    nextPlayer.classList.add('active');

                    let temp = currentPlayer;
                    currentPlayer = nextPlayer;
                    nextPlayer = temp;
                    resolve();
                };

                currentPlayer.onerror = resolve;
                currentPlayer.play().catch(resolve);
            });
        }
    </script>
</body>
</html>
